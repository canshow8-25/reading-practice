<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON AIR | 音読ブース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15191E;
    --panel:#1F252D;
    --panel-edge:#2A323D;
    --paper:#F3EDE3;
    --paper-dim:#E4DCCB;
    --amber:#FF7A33;
    --amber-dim:#8A4424;
    --mint:#6FCF97;
    --mist:#8C97A6;
    --danger:#E0566B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:18px 18px 36px;
  }

  /* ---------- header / lamp ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .lamp{
    width:14px;height:14px;border-radius:50%;
    background:var(--amber-dim);
    box-shadow:0 0 0 3px rgba(255,122,51,0.08);
    transition:background .25s, box-shadow .25s;
  }
  .lamp.live{
    background:var(--amber);
    box-shadow:0 0 0 4px rgba(255,122,51,0.25), 0 0 16px rgba(255,122,51,0.6);
    animation:pulse 1.4s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce){ .lamp.live{ animation:none; } }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.55;} }
  .brand h1{
    font-size:15px;
    letter-spacing:.14em;
    margin:0;
    font-weight:700;
    text-transform:uppercase;
  }
  .brand small{ display:block; color:var(--mist); font-size:11px; letter-spacing:.04em; margin-top:1px;}

  .teacher-link{
    background:none;border:none;color:var(--mist);
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:.03em;
    cursor:pointer; padding:6px 8px; border-radius:6px;
  }
  .teacher-link:hover{ color:var(--paper); background:var(--panel); }
  .teacher-link:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }

  /* ---------- passage card ---------- */
  .passage-card{
    background:var(--paper);
    color:var(--ink);
    border-radius:14px;
    padding:20px 20px 16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }
  .passage-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:#6b6256;
    letter-spacing:.06em;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
  }
  #passageText{
    font-family:'Source Serif 4', serif;
    font-size:19px;
    line-height:1.6;
    margin:0 0 14px;
  }
  #passageText.placeholder{ color:#8a8275; font-style:italic; font-size:16px; }

  .ghost-btn{
    background:none;
    border:1.5px solid #00000022;
    color:#3a352c;
    border-radius:999px;
    padding:8px 14px;
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .ghost-btn:hover{ background:#00000010; }
  .ghost-btn:disabled{ opacity:.4; cursor:default; }
  .ghost-btn:focus-visible, button:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }

  /* ---------- mic stage ---------- */
  .mic-stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:30px 0 8px;
  }
  .mic-btn{
    width:128px;height:128px;
    border-radius:50%;
    border:2px solid var(--panel-edge);
    background:radial-gradient(circle at 35% 30%, var(--panel-edge), var(--panel));
    color:var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    cursor:pointer;
    transition:transform .15s, border-color .25s, box-shadow .25s;
  }
  .mic-btn:hover{ transform:translateY(-2px); }
  .mic-btn .mic-icon{ font-size:30px; color:var(--amber); transition:color .2s; }
  .mic-btn .mic-label{ font-size:11px; letter-spacing:.06em; color:var(--mist); text-transform:uppercase; }
  .mic-btn[aria-pressed="true"]{
    border-color:var(--amber);
    box-shadow:0 0 0 6px rgba(255,122,51,0.12), 0 0 30px rgba(255,122,51,0.35);
  }
  .mic-btn[aria-pressed="true"] .mic-icon{ color:var(--amber); animation:pulse 1.1s ease-in-out infinite; }
  .mic-btn:disabled{ opacity:.4; cursor:default; }

  .live-transcript{
    min-height:20px;
    margin:16px 10px 0;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    color:var(--mist);
    text-align:center;
    line-height:1.5;
  }

  .hint{
    text-align:center;
    font-size:11px;
    color:var(--mist);
    margin-top:6px;
  }

  /* ---------- feedback panel ---------- */
  .feedback-panel{
    margin-top:26px;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:14px;
    padding:18px 18px 16px;
  }
  .feedback-panel.hidden{ display:none; }
  .feedback-title{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.08em;
    color:var(--mist);
    text-transform:uppercase;
    margin:0 0 14px;
  }
  .score-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .score-row .label{
    width:64px;
    font-size:12px;
    color:var(--mist);
    flex-shrink:0;
  }
  .score-track{
    flex:1;
    height:8px;
    border-radius:999px;
    background:var(--panel-edge);
    overflow:hidden;
  }
  .score-fill{
    height:100%;
    border-radius:999px;
    width:0%;
    background:var(--amber);
    transition:width .6s ease;
  }
  .score-fill.good{ background:var(--mint); }
  .score-num{
    width:34px;
    text-align:right;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--paper);
    flex-shrink:0;
  }
  .advice-bubble{
    margin-top:14px;
    background:var(--ink);
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.6;
    color:var(--paper);
    border-left:3px solid var(--amber);
  }
  .feedback-loading{
    display:flex; align-items:center; gap:8px;
    color:var(--mist); font-size:13px;
  }
  .spinner{
    width:14px;height:14px;border-radius:50%;
    border:2px solid var(--panel-edge);
    border-top-color:var(--amber);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .feedback-error{ color:var(--danger); font-size:13px; }
  .retry-row{ margin-top:14px; text-align:right; }
  .retry-row button{
    background:none; border:1px solid var(--panel-edge); color:var(--mist);
    border-radius:999px; padding:6px 12px; font-size:12px; cursor:pointer;
    font-family:'Space Grotesk', sans-serif;
  }
  .retry-row button:hover{ color:var(--paper); border-color:var(--mist); }

  /* ---------- teacher dialog ---------- */
  dialog#teacherDialog{
    border:none;
    border-radius:14px;
    padding:0;
    background:var(--panel);
    color:var(--paper);
    width:min(420px, 90vw);
  }
  dialog::backdrop{ background:rgba(0,0,0,0.55); }
  .dialog-inner{ padding:20px; }
  .dialog-inner h2{ font-size:14px; letter-spacing:.06em; text-transform:uppercase; margin:0 0 4px; color:var(--mist); }
  .dialog-inner p.note{ font-size:12px; color:var(--mist); margin:0 0 14px; }
  .dialog-inner textarea{
    width:100%;
    min-height:120px;
    border-radius:10px;
    border:1px solid var(--panel-edge);
    background:var(--ink);
    color:var(--paper);
    font-family:'Source Serif 4', serif;
    font-size:15px;
    padding:12px;
    resize:vertical;
  }
  .dialog-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:14px;
  }
  .btn-primary{
    background:var(--amber); color:#241000; border:none;
    border-radius:999px; padding:9px 18px; font-weight:700; font-size:13px;
    cursor:pointer; font-family:'Space Grotesk', sans-serif;
  }
  .btn-primary:hover{ filter:brightness(1.05); }
  .btn-secondary{
    background:none; border:1px solid var(--panel-edge); color:var(--mist);
    border-radius:999px; padding:9px 16px; font-size:13px; cursor:pointer;
    font-family:'Space Grotesk', sans-serif;
  }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--panel-edge); color:var(--paper);
    padding:10px 16px; border-radius:999px; font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    opacity:0; transition:opacity .25s;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="lamp" id="lamp"></div>
      <div>
        <h1>ON AIR / 音読ブース</h1>
        <small id="roleHint">課題文を読んで録音しよう</small>
      </div>
    </div>
    <div style="text-align:right;">
      <button class="teacher-link" id="teacherBtn">先生用</button>
      <div id="practiceCountLine" style="font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--mist); margin-top:2px;"></div>
    </div>
  </header>

  <section class="passage-card">
    <div class="passage-meta">
      <span>今日の課題文</span>
      <span id="updatedAt">―</span>
    </div>
    <p id="passageText" class="placeholder">先生がまだ文章を公開していません。「先生用」から課題文を貼ってください。</p>
    <button class="ghost-btn" id="listenBtn" disabled>🔊 モデル音声を聞く</button>
  </section>

  <section class="mic-stage" id="micStage">
    <button class="mic-btn" id="micBtn" aria-pressed="false" disabled>
      <span class="mic-icon">●</span>
      <span class="mic-label">タップして録音</span>
    </button>
    <p class="live-transcript" id="liveTranscript" aria-live="polite"></p>
    <p class="hint" id="hint">課題文が公開されると録音できます</p>
  </section>

  <section class="mic-stage hidden" id="fallbackStage">
    <p class="hint" style="margin-bottom:10px;">
      このブラウザでは自動の音声認識が使えません。<br>
      キーボードの🎤(音声入力)ボタンで読んだ内容を入力してください。
    </p>
    <textarea id="manualTranscript" rows="4" placeholder="ここをタップしてキーボードの音声入力ボタンを使う、または直接入力"
      style="width:100%;border-radius:10px;border:1px solid var(--panel-edge);background:var(--panel);color:var(--paper);font-family:'Source Serif 4', serif;font-size:15px;padding:12px;"></textarea>
    <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
      <button class="ghost-btn" id="manualTimerBtn" style="border-color:var(--panel-edge); color:var(--paper);">計測開始</button>
      <span id="manualTimerLabel" style="font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--mist);"></span>
    </div>
    <button class="ghost-btn" id="manualSubmitBtn" disabled style="margin-top:12px; border-color:var(--amber); color:var(--paper); background:var(--amber-dim);">採点する</button>
  </section>

  <section class="feedback-panel hidden" id="feedbackPanel">
    <p class="feedback-title">採点結果</p>
    <div id="feedbackBody"></div>
  </section>

</div>

<dialog id="pinDialog">
  <div class="dialog-inner">
    <h2>先生用認証</h2>
    <p class="note">PINコードを入力してください。</p>
    <input type="password" id="pinInput" inputmode="numeric" autocomplete="off"
      style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--panel-edge);background:var(--ink);color:var(--paper);font-size:16px;letter-spacing:.1em;font-family:'JetBrains Mono', monospace;">
    <p id="pinError" style="color:var(--danger);font-size:12px;min-height:16px;margin:8px 0 0;"></p>
    <div class="dialog-actions">
      <button class="btn-secondary" id="pinCancel">閉じる</button>
      <button class="btn-primary" id="pinConfirm">確認</button>
    </div>
  </div>
</dialog>

<dialog id="teacherDialog">
  <div class="dialog-inner">
    <h2>先生用設定</h2>
    <p class="note">ここに貼った文章が、このアプリを開いている生徒全員に共有されます。</p>
    <textarea id="teacherTextarea" placeholder="例: Reading aloud every day is one of the best ways to improve your English pronunciation."></textarea>
    <div class="dialog-actions">
      <button class="btn-secondary" id="dialogCancel">閉じる</button>
      <button class="btn-primary" id="dialogPublish">公開する</button>
    </div>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'current-passage';
// 先生用ページのPINコード。必要に応じてここを書き換えてください。
const TEACHER_PIN = '2026';
const storageAvailable = !!(window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function');
let currentPassage = '';
let currentUpdatedAt = null;
let recognition = null;
let isListening = false;
let startTime = null;
let finalTranscript = '';
let speechSupported = true;
let practiceCount = 0;

const els = {
  lamp: document.getElementById('lamp'),
  passageText: document.getElementById('passageText'),
  updatedAt: document.getElementById('updatedAt'),
  listenBtn: document.getElementById('listenBtn'),
  micBtn: document.getElementById('micBtn'),
  liveTranscript: document.getElementById('liveTranscript'),
  hint: document.getElementById('hint'),
  feedbackPanel: document.getElementById('feedbackPanel'),
  feedbackBody: document.getElementById('feedbackBody'),
  teacherBtn: document.getElementById('teacherBtn'),
  teacherDialog: document.getElementById('teacherDialog'),
  teacherTextarea: document.getElementById('teacherTextarea'),
  dialogCancel: document.getElementById('dialogCancel'),
  dialogPublish: document.getElementById('dialogPublish'),
  toast: document.getElementById('toast'),
  practiceCountLine: document.getElementById('practiceCountLine'),
  micStage: document.getElementById('micStage'),
  fallbackStage: document.getElementById('fallbackStage'),
  manualTranscript: document.getElementById('manualTranscript'),
  manualTimerBtn: document.getElementById('manualTimerBtn'),
  manualTimerLabel: document.getElementById('manualTimerLabel'),
  manualSubmitBtn: document.getElementById('manualSubmitBtn'),
};

function showToast(msg){
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  setTimeout(()=> els.toast.classList.remove('show'), 2200);
}

function formatTime(ts){
  try{
    const d = new Date(ts);
    return d.toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
  }catch(e){ return ''; }
}

async function loadPassage(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const data = JSON.parse(res.value);
      applyPassage(data.text, data.updatedAt);
    }
  }catch(e){
    // no passage published yet
  }
}

async function loadPracticeCount(){
  practiceCount = 0;
  try{
    const res = await window.storage.get('practice-count', false);
    if(res && res.value){
      const data = JSON.parse(res.value);
      if(data.passageUpdatedAt === currentUpdatedAt){
        practiceCount = data.count || 0;
      }
    }
  }catch(e){
    practiceCount = 0;
  }
  renderPracticeCount();
}

function renderPracticeCount(){
  els.practiceCountLine.textContent = `この文章での練習回数: ${practiceCount}回`;
}

async function incrementPracticeCount(){
  practiceCount += 1;
  renderPracticeCount();
  try{
    await window.storage.set('practice-count', JSON.stringify({ passageUpdatedAt: currentUpdatedAt, count: practiceCount }), false);
  }catch(e){
    // non-fatal; count just won't persist this time
  }
}

function applyPassage(text, updatedAt){
  const changed = updatedAt !== currentUpdatedAt;
  currentPassage = (text || '').trim();
  currentUpdatedAt = updatedAt || null;
  if(currentPassage){
    els.passageText.textContent = currentPassage;
    els.passageText.classList.remove('placeholder');
    els.updatedAt.textContent = updatedAt ? formatTime(updatedAt) : '';
    els.listenBtn.disabled = false;
    els.micBtn.disabled = !speechSupported;
    els.manualSubmitBtn.disabled = false;
    els.hint.textContent = speechSupported ? 'マイクをタップして読み始めよう' : 'お使いのブラウザは音声認識に対応していません(Chrome推奨)';
  } else {
    els.passageText.textContent = '先生がまだ文章を公開していません。「先生用」から課題文を貼ってください。';
    els.passageText.classList.add('placeholder');
    els.updatedAt.textContent = '―';
    els.listenBtn.disabled = true;
    els.micBtn.disabled = true;
    els.manualSubmitBtn.disabled = true;
    els.hint.textContent = '課題文が公開されると録音できます';
  }
  if(changed) loadPracticeCount();
}

// ---------- model voice (TTS) ----------
els.listenBtn.addEventListener('click', ()=>{
  if(!currentPassage) return;
  const utter = new SpeechSynthesisUtterance(currentPassage);
  utter.lang = 'en-US';
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if(enVoice) utter.voice = enVoice;
  utter.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
});

// ---------- speech recognition ----------
const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SpeechRecognitionImpl){
  speechSupported = false;
  els.micStage.classList.add('hidden');
  els.fallbackStage.classList.remove('hidden');
} else {
  recognition = new SpeechRecognitionImpl();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (event)=>{
    let interim = '';
    finalTranscript = '';
    for(let i=0; i<event.results.length; i++){
      const transcriptPiece = event.results[i][0].transcript;
      if(event.results[i].isFinal){
        finalTranscript += transcriptPiece + ' ';
      } else {
        interim += transcriptPiece;
      }
    }
    els.liveTranscript.textContent = (finalTranscript + interim).trim();
  };

  recognition.onerror = (event)=>{
    showToast('音声認識でエラーが発生しました: ' + event.error);
    stopListening(false);
  };

  recognition.onend = ()=>{
    if(isListening){
      // recognition stopped itself (e.g. silence) — treat as end of turn
      finishListening();
    }
  };
}

els.micBtn.addEventListener('click', ()=>{
  if(!speechSupported || !currentPassage) return;
  if(!isListening){
    startListening();
  } else {
    finishListening();
  }
});

function startListening(){
  isListening = true;
  startTime = Date.now();
  finalTranscript = '';
  els.liveTranscript.textContent = '';
  els.feedbackPanel.classList.add('hidden');
  els.lamp.classList.add('live');
  els.micBtn.setAttribute('aria-pressed', 'true');
  els.micBtn.querySelector('.mic-label').textContent = 'タップで停止';
  els.hint.textContent = 'はっきりした声で読んでください';
  try{ recognition.start(); }catch(e){ /* already started */ }
}

function finishListening(){
  if(!isListening) return;
  isListening = false;
  const duration = (Date.now() - startTime) / 1000;
  els.lamp.classList.remove('live');
  els.micBtn.setAttribute('aria-pressed', 'false');
  els.micBtn.querySelector('.mic-label').textContent = 'タップして録音';
  els.hint.textContent = 'マイクをタップして読み始めよう';
  try{ recognition.stop(); }catch(e){}
  incrementPracticeCount();
  evaluateReading(finalTranscript.trim(), duration);
}

function stopListening(){
  isListening = false;
  els.lamp.classList.remove('live');
  els.micBtn.setAttribute('aria-pressed', 'false');
  els.micBtn.querySelector('.mic-label').textContent = 'タップして録音';
  try{ recognition.stop(); }catch(e){}
}

// ---------- AI evaluation ----------
async function evaluateReading(transcript, durationSec){
  els.feedbackPanel.classList.remove('hidden');
  els.feedbackBody.innerHTML = '<div class="feedback-loading"><span class="spinner"></span>採点中…</div>';

  if(!transcript){
    els.feedbackBody.innerHTML = '<p class="feedback-error">音声が認識できませんでした。もう一度はっきり読んでみよう。</p>' + retryButtonHtml();
    bindRetry();
    return;
  }

  const wordCount = currentPassage.split(/\s+/).filter(Boolean).length;
  const wpm = durationSec > 0 ? (wordCount / (durationSec/60)) : 0;

  const systemInstruction = `あなたは日本の高校生向けの英語発音コーチです。以下の情報だけを根拠に、JSONのみを出力してください(説明文や前置き、コードブロック記号は一切不要です)。
出力形式(厳守): {"pronunciation": 0から100の整数, "fluency": 0から100の整数, "advice": "日本語で1文、具体的な改善点をひとつだけ"}
判断基準:
- pronunciation: 模範文と音声認識結果(transcript)を比較し、欠落・誤認識された単語が多いほど低くする。音声認識の誤りは実際の発音のズレを反映していることが多い。
- fluency: 読み上げ速度(wpm)が高校生の音読として自然な範囲(目安90〜140wpm)から外れているほど低くする。
- advice: 採点理由の説明ではなく、次に直すべき発音や単語をひとつだけ具体的に挙げる、温かみのある一言。`;

  const userMessage = `模範文: "${currentPassage}"
生徒の音声認識結果: "${transcript}"
読了時間: ${durationSec.toFixed(1)}秒
模範文の語数: ${wordCount}語
推定wpm: ${wpm.toFixed(0)}`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemInstruction,
        messages: [{ role: "user", content: userMessage }]
      })
    });
    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if(!textBlock) throw new Error('no text in response');
    const cleaned = textBlock.text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    renderFeedback(parsed);
  } catch(e){
    els.feedbackBody.innerHTML = '<p class="feedback-error">採点に失敗しました。もう一度お試しください。</p>' + retryButtonHtml();
    bindRetry();
  }
}

function retryButtonHtml(){
  return '<div class="retry-row"><button id="retryBtn">もう一度読む</button></div>';
}
function bindRetry(){
  const btn = document.getElementById('retryBtn');
  if(btn) btn.addEventListener('click', ()=>{ els.feedbackPanel.classList.add('hidden'); });
}

function renderFeedback(result){
  const pron = Math.max(0, Math.min(100, Math.round(result.pronunciation ?? 0)));
  const flu = Math.max(0, Math.min(100, Math.round(result.fluency ?? 0)));
  const advice = result.advice || '';

  els.feedbackBody.innerHTML = `
    ${scoreRowHtml('発音', pron)}
    ${scoreRowHtml('流暢さ', flu)}
    <div class="advice-bubble">${escapeHtml(advice)}</div>
    ${retryButtonHtml()}
  `;
  bindRetry();
  requestAnimationFrame(()=>{
    document.querySelectorAll('.score-fill').forEach(el=>{
      el.style.width = el.dataset.target + '%';
    });
  });
}

function scoreRowHtml(label, score){
  const cls = score >= 75 ? 'good' : '';
  return `<div class="score-row">
    <span class="label">${label}</span>
    <span class="score-track"><span class="score-fill ${cls}" data-target="${score}"></span></span>
    <span class="score-num">${score}</span>
  </div>`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---------- fallback (manual dictation) flow ----------
let manualTimerRunning = false;
let manualStartTime = null;
let manualDuration = 0;

els.manualTimerBtn.addEventListener('click', ()=>{
  if(!manualTimerRunning){
    manualTimerRunning = true;
    manualStartTime = Date.now();
    els.manualTimerBtn.textContent = '計測終了';
    els.manualTimerLabel.textContent = '計測中…';
  } else {
    manualTimerRunning = false;
    manualDuration = (Date.now() - manualStartTime) / 1000;
    els.manualTimerBtn.textContent = '計測開始';
    els.manualTimerLabel.textContent = `${manualDuration.toFixed(1)}秒`;
  }
});

els.manualSubmitBtn.addEventListener('click', ()=>{
  const transcript = els.manualTranscript.value.trim();
  if(!transcript){ showToast('読み取った文章を入力してください'); return; }
  if(manualTimerRunning){
    manualDuration = (Date.now() - manualStartTime) / 1000;
    manualTimerRunning = false;
    els.manualTimerBtn.textContent = '計測開始';
  }
  let duration = manualDuration;
  if(!duration || duration <= 0){
    // タイマー未使用の場合は、自然な読み上げ速度(120wpm)で簡易推定する
    const wordCount = currentPassage.split(/\s+/).filter(Boolean).length;
    duration = wordCount / (120/60);
  }
  incrementPracticeCount();
  evaluateReading(transcript, duration);
});

// ---------- teacher dialog ----------
const pinDialog = document.getElementById('pinDialog');
const pinInput = document.getElementById('pinInput');
const pinError = document.getElementById('pinError');
const pinCancel = document.getElementById('pinCancel');
const pinConfirm = document.getElementById('pinConfirm');

els.teacherBtn.addEventListener('click', ()=>{
  pinInput.value = '';
  pinError.textContent = '';
  pinDialog.showModal();
  setTimeout(()=> pinInput.focus(), 50);
});

pinCancel.addEventListener('click', ()=> pinDialog.close());

function tryUnlockTeacherPage(){
  if(pinInput.value === TEACHER_PIN){
    pinDialog.close();
    els.teacherTextarea.value = currentPassage;
    els.teacherDialog.showModal();
  } else {
    pinError.textContent = 'PINコードが正しくありません';
  }
}
pinConfirm.addEventListener('click', tryUnlockTeacherPage);
pinInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ e.preventDefault(); tryUnlockTeacherPage(); }
});
els.dialogCancel.addEventListener('click', ()=> els.teacherDialog.close());
els.dialogPublish.addEventListener('click', async ()=>{
  const text = els.teacherTextarea.value.trim();
  if(!text){ showToast('文章を入力してください'); return; }
  els.dialogPublish.disabled = true;
  try{
    const updatedAt = Date.now();
    await window.storage.set(STORAGE_KEY, JSON.stringify({ text, updatedAt }), true);
    applyPassage(text, updatedAt);
    els.teacherDialog.close();
    showToast('課題文を公開しました');
  } catch(e){
    console.error('publish failed:', e);
    showToast('公開に失敗しました: ' + (e && e.message ? e.message : String(e)));
  } finally {
    els.dialogPublish.disabled = false;
  }
});

function showStorageUnavailableNotice(){
  els.passageText.textContent = 'このページはClaudeのアーティファクトとして開いた時だけ動作します。.htmlファイルを直接ダウンロード/コピーしてブラウザで開いた場合は、課題文の共有機能が使えません。生徒には「このアーティファクトの共有リンク」を開いてもらってください。';
  els.passageText.classList.add('placeholder');
  els.updatedAt.textContent = '―';
  els.listenBtn.disabled = true;
  els.micBtn.disabled = true;
  els.hint.textContent = '';
  els.teacherBtn.disabled = true;
  els.practiceCountLine.textContent = '';
}

// ---------- init ----------
if(!storageAvailable){
  showStorageUnavailableNotice();
} else {
  renderPracticeCount();
  loadPassage();
}
if(!speechSupported){
  els.hint.textContent = 'お使いのブラウザは音声認識に対応していません(Chrome推奨)';
}
</script>
