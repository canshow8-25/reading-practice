<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronunciation Check</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: #2e3348;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--muted);
    font-size: 14px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  button {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #3b7de8; }
  .btn-primary:disabled { background: #2e3348; color: var(--muted); cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:disabled { color: var(--muted); cursor: not-allowed; }

  .btn-record {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    position: relative;
  }
  .btn-record.recording {
    background: rgba(248, 113, 113, 0.15);
    border-color: var(--red);
    color: var(--red);
  }
  .btn-record.recording .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1s infinite;
    flex-shrink: 0;
  }
  .dot { display: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Result display */
  .result-area {
    margin-top: 18px;
    display: none;
  }
  .result-area.visible { display: block; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 18px 0;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Word-by-word comparison */
  .word-display {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    line-height: 1;
  }

  .word-chip {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    border: 1.5px solid transparent;
  }
  .word-chip .said {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.7;
  }

  .word-correct {
    background: rgba(52, 211, 153, 0.1);
    border-color: var(--green);
    color: var(--green);
  }
  .word-wrong {
    background: rgba(248, 113, 113, 0.1);
    border-color: var(--red);
    color: var(--red);
  }
  .word-missing {
    background: rgba(251, 191, 36, 0.1);
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .word-punct {
    background: transparent;
    border-color: transparent;
    color: var(--muted);
    padding: 6px 2px;
  }

  /* Score ring */
  .score-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .score-ring {
    position: relative;
    width: 72px;
    height: 72px;
    flex-shrink: 0;
  }
  .score-ring svg {
    transform: rotate(-90deg);
  }
  .score-ring .score-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
  }

  .score-detail {
    flex: 1;
  }
  .score-label {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .score-sub {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* Transcript */
  .transcript-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--muted);
    min-height: 40px;
  }
  .transcript-box span.heard {
    color: var(--text);
  }

  /* Tips */
  .tips-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .tip-icon { flex-shrink: 0; font-size: 16px; }

  /* Status bar */
  .status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 20px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .lang-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* Unsupported */
  .unsupported {
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid var(--yellow);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    color: var(--yellow);
    font-family: 'Noto Sans JP', sans-serif;
    margin-top: 10px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">English Practice Tool</div>
  <h1>Pronunciation Check</h1>
  <p class="subtitle">英文を入力して、発音を録音するだけ</p>
</header>

<!-- Step 1: Input -->
<div class="card">
  <div class="card-label">Step 1 — 練習する英文を入力</div>
  <textarea id="inputText" placeholder="例: The thirty-three thieves thought that they thrilled the throne throughout Thursday."></textarea>

  <div class="btn-row">
    <button class="btn-primary" id="btnListen" onclick="speakText()">
      🔊 お手本を聞く
    </button>
    <button class="btn-secondary" onclick="clearAll()">
      ✕ クリア
    </button>
  </div>
  <div class="status" id="ttsStatus"></div>
</div>

<!-- Step 2: Record -->
<div class="card">
  <div class="card-label">Step 2 — マイクで発音する</div>

  <div class="btn-row">
    <button class="btn-record" id="btnRecord" onclick="toggleRecording()">
      <span class="dot"></span>
      <span id="recordLabel">🎤 録音開始</span>
    </button>
  </div>

  <div class="transcript-box" id="transcript">
    <span style="color:var(--muted)">ここに認識結果が表示されます</span>
  </div>
  <div class="status" id="recStatus"></div>
  <div class="unsupported" id="unsupported">
    ⚠️ お使いのブラウザは音声認識に対応していません。Chrome または Edge をお試しください。
  </div>
  <p class="lang-note">※ 認識言語: English (US) — Chrome / Edge 推奨</p>
</div>

<!-- Step 3: Result -->
<div class="card">
  <div class="card-label">Step 3 — 結果を確認</div>

  <div id="resultArea" class="result-area">

    <div class="score-row">
      <div class="score-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="30" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle id="scoreCircle" cx="36" cy="36" r="30" fill="none" stroke="var(--green)" stroke-width="6"
            stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke-linecap="round"
            style="transition: stroke-dashoffset 0.8s ease, stroke 0.4s"/>
        </svg>
        <div class="score-num" id="scoreNum">–</div>
      </div>
      <div class="score-detail">
        <div class="score-label" id="scoreLabel">–</div>
        <div class="score-sub" id="scoreSub">録音して評価を開始してください</div>
      </div>
    </div>

    <div class="section-title">単語ごとの評価</div>
    <div class="word-display" id="wordDisplay"></div>

    <div class="divider"></div>

    <div class="section-title">発音のヒント</div>
    <div class="tips-list" id="tipsList">
      <div class="tip-item">
        <span class="tip-icon">💡</span>
        <span>録音後にヒントが表示されます</span>
      </div>
    </div>

  </div>

  <div id="resultPlaceholder" style="color:var(--muted); font-size:14px; font-family:'Noto Sans JP',sans-serif;">
    録音が終わると、ここに評価が表示されます。
  </div>
</div>

<script>
// ── TTS ──────────────────────────────────────────────
function speakText() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) {
    setStatus('ttsStatus', '⚠️ テキストを入力してください');
    return;
  }
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.85;

  // Prefer an English voice
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && !v.lang.includes('IN'));
  if (enVoice) utt.voice = enVoice;

  utt.onstart = () => setStatus('ttsStatus', '🔊 再生中...');
  utt.onend = () => setStatus('ttsStatus', '✓ 再生完了');
  utt.onerror = () => setStatus('ttsStatus', '⚠️ 再生できませんでした');
  speechSynthesis.speak(utt);
}

// Load voices (async on some browsers)
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// ── Speech Recognition ────────────────────────────────
let recognition = null;
let isRecording = false;
let finalTranscript = '';

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('unsupported').style.display = 'block';
    document.getElementById('btnRecord').disabled = true;
    return false;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    let interim = '';
    finalTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const box = document.getElementById('transcript');
    box.innerHTML = `<span class="heard">${finalTranscript}</span><span style="color:var(--muted)">${interim}</span>`;
  };

  recognition.onend = () => {
    stopRecording();
    if (finalTranscript) evaluate();
  };

  recognition.onerror = (e) => {
    stopRecording();
    const msgs = {
      'not-allowed': 'マイクの許可が必要です。ブラウザの設定を確認してください。',
      'no-speech': '音声が検出されませんでした。もう一度お試しください。',
      'network': 'ネットワークエラーが発生しました。',
    };
    setStatus('recStatus', '⚠️ ' + (msgs[e.error] || `エラー: ${e.error}`));
  };

  return true;
}

function toggleRecording() {
  if (isRecording) {
    recognition.stop();
    return;
  }

  const text = document.getElementById('inputText').value.trim();
  if (!text) {
    setStatus('recStatus', '⚠️ まずテキストを入力してください');
    return;
  }

  if (!recognition && !initRecognition()) return;

  finalTranscript = '';
  document.getElementById('transcript').innerHTML = '<span style="color:var(--muted)">聞いています...</span>';

  recognition.start();
  isRecording = true;
  const btn = document.getElementById('btnRecord');
  btn.classList.add('recording');
  document.querySelector('.dot').style.display = 'inline-block';
  document.getElementById('recordLabel').textContent = '■ 録音停止';
  setStatus('recStatus', '🎤 話してください...');
}

function stopRecording() {
  isRecording = false;
  const btn = document.getElementById('btnRecord');
  btn.classList.remove('recording');
  document.querySelector('.dot').style.display = 'none';
  document.getElementById('recordLabel').textContent = '🎤 録音開始';
  setStatus('recStatus', '');
}

// ── Evaluation ────────────────────────────────────────
const COMMON_TIPS = {
  'th': { icon: '👅', text: '「th」の発音：舌先を上の歯の裏に当てて息を出します。「s」「z」「d」と混同しやすいです。' },
  'r':  { icon: '🌀', text: '「r」の発音：舌を口の中で浮かせて、どこにも触れないようにします。「l」と区別しましょう。' },
  'l':  { icon: '👄', text: '「l」の発音：舌先を上の歯の裏（歯茎）にしっかり当てます。' },
  'v':  { icon: '🦷', text: '「v」の発音：上の歯を下唇に当てて声を出します。「b」と混同しやすいです。' },
  'f':  { icon: '💨', text: '「f」の発音：上の歯を下唇に当てて息を出します（声は出しません）。' },
  'final': { icon: '🔚', text: '語末の子音（-t, -d, -k, -p など）をしっかり発音しましょう。日本語にない音なので省略しがちです。' },
};

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z']/g, '');
}

function tokenize(text) {
  // split keeping punctuation separate
  return text.match(/[\w']+|[.,!?;:]/g) || [];
}

function evaluate() {
  const target = document.getElementById('inputText').value.trim();
  const heard  = finalTranscript.trim();

  if (!target || !heard) return;

  const targetTokens = tokenize(target);
  const heardWords   = heard.toLowerCase().split(/\s+/).map(w => w.replace(/[^a-z']/g, '')).filter(Boolean);

  // align target words vs heard words
  const targetWords = targetTokens.filter(t => /\w/.test(t));
  const alignment   = align(targetWords.map(normalize), heardWords);

  let correct = 0;
  const chips = [];
  const wrongWords = [];

  let hi = 0; // heard index
  for (const tok of targetTokens) {
    if (!/\w/.test(tok)) {
      chips.push({ type: 'punct', text: tok });
      continue;
    }
    const entry = alignment.shift();
    if (!entry) {
      chips.push({ type: 'missing', text: tok, said: '–' });
      wrongWords.push(tok);
      continue;
    }
    if (entry.match) {
      correct++;
      chips.push({ type: 'correct', text: tok, said: entry.heard });
    } else {
      chips.push({ type: 'wrong', text: tok, said: entry.heard || '–' });
      wrongWords.push(tok);
    }
  }

  const score = Math.round((correct / targetWords.length) * 100);
  showResult(score, chips, wrongWords);
}

// Simple greedy alignment
function align(targets, heards) {
  const result = [];
  let hi = 0;
  for (let ti = 0; ti < targets.length; ti++) {
    const t = targets[ti];
    // look ahead a bit for a match
    let found = false;
    for (let look = hi; look < Math.min(hi + 3, heards.length); look++) {
      if (heards[look] === t || similarity(t, heards[look]) > 0.8) {
        result.push({ match: true, heard: heards[look] });
        hi = look + 1;
        found = true;
        break;
      }
    }
    if (!found) {
      if (hi < heards.length) {
        result.push({ match: false, heard: heards[hi] });
        hi++;
      } else {
        result.push({ match: false, heard: '' });
      }
    }
  }
  return result;
}

// Simple char-overlap similarity
function similarity(a, b) {
  if (!a || !b) return 0;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  let matches = 0;
  for (let i = 0; i < shorter.length; i++) {
    if (longer.includes(shorter[i])) matches++;
  }
  return matches / longer.length;
}

function showResult(score, chips, wrongWords) {
  document.getElementById('resultPlaceholder').style.display = 'none';
  document.getElementById('resultArea').classList.add('visible');

  // Score ring
  const circumference = 188.5;
  const offset = circumference * (1 - score / 100);
  const circle = document.getElementById('scoreCircle');
  circle.style.strokeDashoffset = offset;

  let color, label, sub;
  if (score >= 90) {
    color = 'var(--green)';  label = 'Excellent! 🎉'; sub = 'ほぼ完璧な発音です！';
  } else if (score >= 70) {
    color = 'var(--accent)'; label = 'Good Job! 👍'; sub = 'よく発音できています。赤い単語を練習しましょう。';
  } else if (score >= 50) {
    color = 'var(--yellow)'; label = 'Keep Trying 💪'; sub = 'もう少しです。お手本をもう一度聞いて練習しましょう。';
  } else {
    color = 'var(--red)';    label = 'Try Again 🔄'; sub = 'お手本をよく聞いて、ゆっくり発音してみましょう。';
  }

  circle.style.stroke = color;
  document.getElementById('scoreNum').textContent  = score + '%';
  document.getElementById('scoreNum').style.color  = color;
  document.getElementById('scoreLabel').textContent = label;
  document.getElementById('scoreLabel').style.color = color;
  document.getElementById('scoreSub').textContent  = sub;

  // Word chips
  const display = document.getElementById('wordDisplay');
  display.innerHTML = '';
  for (const chip of chips) {
    const el = document.createElement('div');
    if (chip.type === 'punct') {
      el.className = 'word-chip word-punct';
      el.textContent = chip.text;
    } else {
      el.className = `word-chip word-${chip.type}`;
      el.innerHTML = `${chip.text}<span class="said">${chip.said || '–'}</span>`;
    }
    display.appendChild(el);
  }

  // Tips
  const tipsList = document.getElementById('tipsList');
  tipsList.innerHTML = '';
  const addedTips = new Set();

  for (const w of wrongWords) {
    const wl = w.toLowerCase();

    // th
    if (wl.includes('th') && !addedTips.has('th')) {
      addedTips.add('th'); addTip(tipsList, COMMON_TIPS.th);
    }
    // r vs l
    if (/^r/.test(wl) && !addedTips.has('r')) {
      addedTips.add('r'); addTip(tipsList, COMMON_TIPS.r);
    }
    if (/^l/.test(wl) && !addedTips.has('l')) {
      addedTips.add('l'); addTip(tipsList, COMMON_TIPS.l);
    }
    // v
    if (wl.includes('v') && !addedTips.has('v')) {
      addedTips.add('v'); addTip(tipsList, COMMON_TIPS.v);
    }
    // f
    if (wl.includes('f') && !addedTips.has('f')) {
      addedTips.add('f'); addTip(tipsList, COMMON_TIPS.f);
    }
    // final consonant
    if (/[tpdkbg]$/.test(wl) && !addedTips.has('final')) {
      addedTips.add('final'); addTip(tipsList, COMMON_TIPS.final);
    }
  }

  if (addedTips.size === 0) {
    if (score >= 90) {
      addTip(tipsList, { icon: '🌟', text: 'ほぼ完璧です！次はもっと速いスピードで練習してみましょう。' });
    } else {
      addTip(tipsList, { icon: '🎧', text: 'お手本をもう一度聞いて、特にリズムとストレスに注意して発音してみましょう。' });
    }
  }

  // Always add re-listen tip if there are errors
  if (wrongWords.length > 0) {
    addTip(tipsList, { icon: '🔁', text: '「お手本を聞く」を押してもう一度確認し、ゆっくり繰り返しましょう。' });
  }
}

function addTip(container, tip) {
  const el = document.createElement('div');
  el.className = 'tip-item';
  el.innerHTML = `<span class="tip-icon">${tip.icon}</span><span>${tip.text}</span>`;
  container.appendChild(el);
}

// ── Utils ─────────────────────────────────────────────
function setStatus(id, msg) {
  document.getElementById(id).textContent = msg;
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('transcript').innerHTML = '<span style="color:var(--muted)">ここに認識結果が表示されます</span>';
  document.getElementById('resultArea').classList.remove('visible');
  document.getElementById('resultPlaceholder').style.display = 'block';
  setStatus('ttsStatus', '');
  setStatus('recStatus', '');
  finalTranscript = '';
  speechSynthesis.cancel();
}
</script>
</body>
</html>
